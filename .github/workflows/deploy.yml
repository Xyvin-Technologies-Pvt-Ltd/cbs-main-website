name: Deploy CBS Static Next.js App to AWS Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Build Static Site
        run: npm run build

      - name: Upload Static Files to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          source: "./out/*"
          target: "~/deploy-temp"

      - name: Deploy Static Files on Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          script: |
            sudo mkdir -p /var/www/html/cbs-main
            sudo rm -rf /var/www/html/cbs-main/*
            sudo mv ~/deploy-temp/* /var/www/html/cbs-main/
            sudo rm -rf ~/deploy-temp
            sudo systemctl restart nginx || echo "Nginx not used"
